<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aicommit — AI-generated commits, reviews & PRs</title>
  <meta name="description" content="aic is a Rust CLI that generates conventional commits, PR drafts, and diff reviews with AI." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
:root {
  --mono: 'JetBrains Mono', 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  --sans: 'Geist', Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

html[data-theme="dark"] {
  --bg: #0a0a0a;
  --bg-elev: #111111;
  --bg-elev-2: #1a1a1a;
  --ink: #f4f4f5;
  --ink-soft: #c4c4c7;
  --ink-dim: #878890;
  --line: #232327;
  --line-soft: #1a1a1e;
  --accent: oklch(0.78 0.17 145);
  --accent-soft: oklch(0.78 0.17 145 / 0.14);
  --blue: oklch(0.72 0.14 240);
  --warn: oklch(0.78 0.15 75);
  --danger: oklch(0.68 0.18 22);
}

html[data-theme="light"] {
  --bg: #fafaf9;
  --bg-elev: #ffffff;
  --bg-elev-2: #f4f4f2;
  --ink: #0c0c0d;
  --ink-soft: #3a3a3e;
  --ink-dim: #6b6b72;
  --line: #e4e4e1;
  --line-soft: #ededea;
  --accent: oklch(0.52 0.18 145);
  --accent-soft: oklch(0.52 0.18 145 / 0.1);
  --blue: oklch(0.48 0.17 240);
  --warn: oklch(0.58 0.17 60);
  --danger: oklch(0.54 0.2 22);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink-soft);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: 'ss01', 'cv11';
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: 0; background: transparent; color: inherit; }

.mono { font-family: var(--mono); font-size: 0.93em; }

.shell {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 32px;
}

section { padding: 96px 0; }

/* ============ Nav ============ */
.nav {
  position: sticky;
  top: 0;
  z-index: 50;
  background: color-mix(in oklch, var(--bg) 88%, transparent);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line-soft);
}
.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
}
.nav-left { display: flex; align-items: center; gap: 40px; }
.brand {
  display: inline-flex;
  align-items: baseline;
  gap: 8px;
  font-family: var(--mono);
  font-weight: 600;
  font-size: 15px;
  color: var(--ink);
  letter-spacing: -0.01em;
}
.brand-mark { display: inline-flex; align-items: baseline; color: var(--ink); }
.brand-caret {
  display: inline-block;
  width: 0.5em;
  height: 0.78em;
  background: var(--accent);
  margin-left: 2px;
  transform: translateY(1px);
  animation: blink 1.1s steps(2) infinite;
}
.brand-full { color: var(--ink-dim); font-weight: 400; }
@keyframes blink { 50% { opacity: 0; } }

.nav-links {
  display: flex;
  gap: 28px;
  font-size: 13.5px;
  color: var(--ink-dim);
}
.nav-links a { transition: color 0.15s; }
.nav-links a:hover { color: var(--ink); }

.nav-right { display: flex; align-items: center; gap: 10px; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px;
  border-radius: 7px;
  border: 1px solid var(--line);
  background: transparent;
  color: var(--ink);
  font-family: var(--mono);
  font-size: 12.5px;
  font-weight: 500;
  transition: all 0.15s;
}
.btn:hover { background: var(--bg-elev); border-color: var(--ink-dim); }
.btn-primary {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}
.btn-primary:hover { background: var(--ink-soft); color: var(--bg); }
.btn-ghost {
  border-color: transparent;
  color: var(--ink-dim);
}
.btn-ghost:hover { color: var(--ink); background: var(--bg-elev); border-color: var(--line-soft); }
.icon-btn {
  width: 32px;
  height: 32px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 7px;
  color: var(--ink-dim);
}
.icon-btn:hover { color: var(--ink); background: var(--bg-elev); }

/* ============ Hero ============ */
.hero { padding: 72px 0 96px; }
.hero-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1.05fr);
  gap: 64px;
  align-items: center;
}
@media (max-width: 920px) {
  .hero-grid { grid-template-columns: 1fr; gap: 48px; }
  section { padding: 72px 0; }
  .shell { padding: 0 20px; }
  .nav-links { display: none; }
}

.hero-kicker {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--ink-dim);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 5px 10px;
  border: 1px solid var(--line);
  border-radius: 100px;
  margin-bottom: 24px;
}
.hero-kicker .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 20%, transparent);
}

.hero h1 {
  font-family: var(--sans);
  font-size: clamp(38px, 5vw, 58px);
  line-height: 1.03;
  letter-spacing: -0.025em;
  color: var(--ink);
  margin: 0 0 20px;
  font-weight: 600;
  text-wrap: balance;
}
.hero h1 .mono {
  color: var(--ink-dim);
  font-weight: 400;
  letter-spacing: -0.01em;
}
.lead {
  font-size: 17px;
  color: var(--ink-soft);
  max-width: 56ch;
  margin: 0 0 32px;
  line-height: 1.55;
}

.hero-cta {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.install-box {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: var(--bg-elev);
  font-family: var(--mono);
  font-size: 13px;
  color: var(--ink);
}
.install-box .prompt { color: var(--accent); }
.install-box button {
  margin-left: 8px;
  padding: 3px 10px;
  border-radius: 5px;
  border: 1px solid var(--line);
  color: var(--ink-dim);
  font-size: 11px;
  font-family: var(--mono);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  transition: all 0.15s;
}
.install-box button:hover {
  color: var(--ink);
  background: var(--bg-elev-2);
  border-color: var(--ink-dim);
}

/* ============ Terminal ============ */
.terminal {
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--bg-elev);
  font-family: var(--mono);
  font-size: 12.5px;
  overflow: hidden;
  box-shadow: 0 30px 80px -20px rgba(0,0,0,0.45), 0 0 0 1px var(--line-soft);
}
.term-chrome {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line-soft);
  background: var(--bg-elev-2);
}
.term-dot {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  display: inline-block;
}
.term-dot.r { background: #ff5f56; }
.term-dot.y { background: #ffbd2e; }
.term-dot.g { background: #27c93f; }
.term-title {
  margin-left: 14px;
  color: var(--ink-dim);
  font-size: 11.5px;
  letter-spacing: 0.02em;
}
.term-body {
  padding: 20px 22px;
  min-height: 440px;
  color: var(--ink);
  line-height: 1.65;
  white-space: pre-wrap;
}
.term-body .dim { color: var(--ink-dim); }
.term-body .green { color: var(--accent); }
.term-body .bold { font-weight: 600; color: var(--ink); }
.term-body .prompt { color: var(--accent); margin-right: 2px; }
.term-body .user { color: var(--ink); }
.cursor {
  display: inline-block;
  width: 0.55em;
  height: 1em;
  background: var(--ink);
  margin-left: 1px;
  vertical-align: text-bottom;
  animation: blink 1s steps(2) infinite;
}

/* ============ Sections ============ */
.section-kicker {
  display: inline-block;
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--accent);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.section-title {
  font-family: var(--sans);
  font-size: clamp(30px, 3.6vw, 42px);
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--ink);
  margin: 0 0 18px;
  font-weight: 600;
  max-width: 20ch;
  text-wrap: balance;
}
.section-sub {
  font-size: 16px;
  color: var(--ink-soft);
  max-width: 64ch;
  margin: 0 0 48px;
}

/* ============ Features ============ */
.features {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 1px;
  background: var(--line-soft);
  border: 1px solid var(--line-soft);
  border-radius: 12px;
  overflow: hidden;
}
@media (max-width: 900px) { .features { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
@media (max-width: 600px) { .features { grid-template-columns: 1fr; } }

.feat {
  background: var(--bg);
  padding: 28px 26px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-height: 280px;
  transition: background 0.2s;
}
.feat:hover { background: var(--bg-elev); }
.feat-head {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-dim);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.feat-cmd {
  font-family: var(--mono);
  font-size: 17px;
  color: var(--ink);
  font-weight: 500;
  letter-spacing: -0.01em;
}
.feat-desc {
  font-size: 14px;
  color: var(--ink-soft);
  line-height: 1.5;
  flex: 1;
}
.feat-visual {
  margin-top: 4px;
  height: 120px;
  border-top: 1px solid var(--line-soft);
  padding-top: 14px;
  display: flex;
  align-items: center;
  justify-content: stretch;
}
.feat-visual > * { width: 100%; height: 100%; }

/* ============ Providers ============ */
.providers {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 1px;
  background: var(--line-soft);
  border: 1px solid var(--line-soft);
  border-radius: 12px;
  overflow: hidden;
}
@media (max-width: 900px) { .providers { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
@media (max-width: 500px) { .providers { grid-template-columns: repeat(2, minmax(0, 1fr)); } }

.prov {
  background: var(--bg);
  padding: 32px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  color: var(--ink-soft);
  transition: background 0.15s, color 0.15s;
}
.prov:hover { background: var(--bg-elev); color: var(--ink); }
.prov-logo { color: var(--ink); }
.prov-name {
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--ink-dim);
  letter-spacing: 0.02em;
}

/* ============ Maps ============ */
.theme-chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 28px;
}
.theme-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 11px 6px 8px;
  border-radius: 100px;
  border: 1px solid var(--line);
  background: var(--bg);
  color: var(--ink-dim);
  font-family: var(--mono);
  font-size: 11.5px;
  transition: all 0.15s;
}
.theme-chip:hover { color: var(--ink); border-color: var(--ink-dim); }
.theme-chip.active {
  color: var(--ink);
  background: var(--bg-elev-2);
  border-color: var(--ink);
}
.theme-chip-swatch {
  width: 14px;
  height: 14px;
  border-radius: 3px;
  border: 1px solid var(--line);
  display: inline-block;
}

.map-gallery {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 20px;
}
@media (max-width: 700px) { .map-gallery { grid-template-columns: 1fr; } }

.map-card {
  border: 1px solid var(--line);
  border-radius: 10px;
  overflow: hidden;
  background: var(--bg);
  transition: border-color 0.2s;
}
.map-card:hover { border-color: var(--ink-dim); }
.map-card-vis {
  aspect-ratio: 4 / 3;
  display: block;
  border-bottom: 1px solid var(--line-soft);
}
.map-card-meta {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 12px 16px;
  font-family: var(--mono);
}
.map-card-name { color: var(--ink); font-size: 13px; font-weight: 500; }
.map-card-sub { color: var(--ink-dim); font-size: 11.5px; }

/* ============ Install tabs ============ */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--line-soft);
}
.tab {
  padding: 10px 16px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--ink-dim);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.15s;
}
.tab:hover { color: var(--ink-soft); }
.tab.active {
  color: var(--ink);
  border-bottom-color: var(--accent);
}
.code-block {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 22px 24px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--ink);
  line-height: 1.7;
  white-space: pre;
  overflow-x: auto;
}

/* ============ Footer ============ */
footer {
  padding: 64px 0 40px;
  border-top: 1px solid var(--line-soft);
}
.foot-grid {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr 1fr;
  gap: 48px;
  margin-bottom: 48px;
}
@media (max-width: 700px) { .foot-grid { grid-template-columns: repeat(2, 1fr); gap: 32px; } }
.foot-col h4 {
  margin: 0 0 14px;
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--ink);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 500;
}
.foot-col ul {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 9px;
}
.foot-col ul a {
  font-size: 13.5px;
  color: var(--ink-dim);
  transition: color 0.15s;
}
.foot-col ul a:hover { color: var(--ink); }
.foot-legal {
  display: flex;
  justify-content: space-between;
  padding-top: 28px;
  border-top: 1px solid var(--line-soft);
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--ink-dim);
  letter-spacing: 0.02em;
}

/* ============ Tweaks ============ */
.tweaks {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 100;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 16px;
  width: 260px;
  box-shadow: 0 16px 40px rgba(0,0,0,0.4);
  font-family: var(--mono);
  font-size: 12px;
}
.tweaks h4 {
  margin: 0 0 12px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-dim);
}
.tweak-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.tweak-row label { color: var(--ink-soft); }
.tweak-seg {
  display: inline-flex;
  border: 1px solid var(--line);
  border-radius: 6px;
  overflow: hidden;
}
.tweak-seg button {
  padding: 4px 10px;
  font-size: 11px;
  color: var(--ink-dim);
  background: transparent;
}
.tweak-seg button.active {
  background: var(--ink);
  color: var(--bg);
}

/* Google Font fallback: use system monos  */
@font-face {
  font-family: 'JetBrains Mono';
  src: local('JetBrains Mono'), local('SF Mono'), local('Menlo');
  font-display: swap;
}

const { useState, useEffect, useRef } = React;

const TERM_SCRIPT = [
  { t: 120,  kind: 'typed', prompt: '$ ', text: 'git add src/auth/session.rs src/api/login.ts', speed: 18 },
  { t: 2800, kind: 'line', text: '' },

const LOOP_MS = 16000;

function Terminal() {
  const [tick, setTick] = useState(0);
  const rafRef = useRef();
  const startRef = useRef(performance.now());
  useEffect(() => {

      const dt = tick - step.t;
      const chars = Math.min(step.text.length, Math.floor(dt / step.speed));
      const visible = step.text.slice(0, chars);
      const next = TERM_SCRIPT[i + 1];
      const isCurrent = !next || tick < next.t;
      lines.push(
        <div key={i}>
          <span className="prompt">{step.prompt}</span>
          <span className="user">{visible}</span>
          {isCurrent && <span className="cursor" />}
        </div>
      );
    }
  }
  return (
    <div className="terminal">
      <div className="term-chrome">
        <span className="term-dot r" /><span className="term-dot y" /><span className="term-dot g" />
        <span className="term-title">~/projects/acme-api — aic</span>
      </div>
      <div className="term-body">{lines}</div>
    </div>
  );
}

function mulberry32(seed) {
  return function() {
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "heroVariant": "terminal"
}/*EDITMODE-END*/;

function App() {
  const [state, setState] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('aic-site') || '{}');
      return { ...TWEAK_DEFAULTS, ...saved };
    } catch { return TWEAK_DEFAULTS; }
  });
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', state.theme);
    localStorage.setItem('aic-site', JSON.stringify(state));
  }, [state]);

  useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setTweaksOpen(true);
      if (d.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setKey = (k, v) => {
    setState(s => {
      const next = { ...s, [k]: v };
      try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*'); } catch {}
      return next;
    });
  };
  const setTheme = (t) => setKey('theme', t);

  return (
    <>
      <Nav theme={state.theme} setTheme={setTheme} />
      <Hero variant={state.heroVariant} />
      <Features />
      <ProvidersSection />
      <DemoSection />
      <MapGallery />
      <InstallSection />
      <Footer />
      <Tweaks state={state} set={setKey} open={tweaksOpen} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
